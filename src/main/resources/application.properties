spring.application.name=Orderly

spring.profiles.active=dev
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orderly_db}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.security.password-encoder=bcrypt

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.connection-timeout=5000
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=2000
spring.rabbitmq.listener.simple.retry.max-attempts=10
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=30000

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration=86400000

rabbitmq.exchange.order=orderly.orders
rabbitmq.exchange.kitchen=orderly.kitchen

rabbitmq.queue.order-created=orderly.queue.order-created
rabbitmq.queue.order-status-changed=orderly.queue.order-status-changed
rabbitmq.queue.audit-order-created=orderly.queue.audit-order-created
rabbitmq.queue.audit-order-status-changed=orderly.queue.audit-order-status-changed
rabbitmq.queue.kitchen-orders=orderly.queue.kitchen-orders

rabbitmq.routing-key.order-created=order.created
rabbitmq.routing-key.order-status-changed=order.status.changed
rabbitmq.routing-key.kitchen-order=kitchen.order.*
